name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6 # v6.0.2
      - uses: actions/setup-go@v6 # v6.2.0
        with:
          go-version: "1.26"
          check-latest: true
      - name: Setup Node.js
        uses: actions/setup-node@v4 # v4
        with:
          node-version: 20
      - name: Build
        run: make ci
      - run: make build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
